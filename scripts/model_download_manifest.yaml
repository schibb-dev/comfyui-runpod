version: 1

# A small, curated manifest of public model URLs that are commonly needed for
# AnimateDiff + IP-Adapter + ControlNet workflows.
#
# The downloader script supports:
# - --tag <tag> (repeatable)
# - --profile <profile> (repeatable)
#
# Destinations are relative to the ComfyUI models directory (default: /ComfyUI/models).

