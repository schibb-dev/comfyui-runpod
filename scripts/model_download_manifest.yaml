profiles:
  # Minimal pack for the AnimateDiff + IP-Adapter + OpenPose ControlNet workflow variant.
  animatediff_ipadapter_controlnet:
    tags: [ipadapter, clip_vision, controlnet]

  # Broader pack that matches many workflows in comfyui_user/default.
  workflows_default:
    tags: [ipadapter, clip_vision, controlnet, flux, wan]

  # MAT inpainting + NMKD + OmniSR upscalers (required for Krita AI Diffusion).
  krita_ai:
    tags: [krita_ai]

aliases:
  # Some workflows expect the 4xLSDIR upscaler. This repo already ships it (WAN template),
  # but it may not be present in your mounted models dir. We'll copy it in if missing.
  - src_candidates:
      # inside container (./workspace mounted at /workspace)
      - /workspace/comfyui-wan/4xLSDIR.pth
      # running on host from repo root
      - workspace/comfyui-wan/4xLSDIR.pth
    dest: upscale_models/4xLSDIR.pth


