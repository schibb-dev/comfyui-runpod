services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Default pin: last ComfyUI commit before #11632 (LTXV2) removed module-level
        # `precompute_freqs_cis` — required for welltop-cn ComfyUI-TeaCache in the WAN base image.
        # Override in `.env`: COMFYUI_REF=origin/master for bleeding-edge (TeaCache will break until upstream fixes).
        COMFYUI_REF: ${COMFYUI_REF:-38d049382533c6662d815b08ca3395e96cca9f57}
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-runpod
    
    # GPU access - allow access to all GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # For docker compose (non-swarm)
    gpus: all
    
    # Volume mounts
    volumes:
      # Persistent workspace data (workflows, input, output, tokens, etc.)
      - ./workspace:/workspace
      # Optional: override host paths for heavy/local-only dirs (WSL + E: shadow). Defaults keep ./workspace/... next to the repo.
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      # Put node_modules on a Docker volume (avoids Windows bind-mount fs issues)
      - experiments_ui_node_modules:/workspace/experiments_ui/web/node_modules
      # Persist ComfyUI's default input/output dirs (ComfyUI uses /ComfyUI/input and /ComfyUI/output)
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/ComfyUI/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/ComfyUI/output
      # Persist ComfyUI user data (settings, DB, manager config, user workflows)
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/ComfyUI/user
      # Persist models (default E:\models on Windows; set COMFYUI_MODELS_DIR in .env to override)
      - "${COMFYUI_MODELS_DIR:-E:/models}:/ComfyUI/models"
      - "${COMFYUI_MODELS_DIR:-E:/models}:/workspace/models"
      # Credentials for Hugging Face and CivitAI
      - ${COMFYUI_BIND_CREDENTIALS_DIR:-./credentials}:/workspace/credentials:ro
      # Custom nodes configuration
      - ./custom_nodes.yaml:/workspace/custom_nodes.yaml:ro
      # Scripts directory for bootstrap and utilities
      - ./scripts:/workspace/scripts:ro
      # Workspace scripts (tuning/watch utilities used at runtime)
      - ./workspace/scripts:/workspace/ws_scripts:ro
      # Custom nodes: use the image's baked-in nodes (from custom_nodes.yaml at build time).
      # Uncomment the line below to override with a local ./custom_nodes directory instead.
      # - ./custom_nodes:/ComfyUI/custom_nodes

    # Ports (host:container). If another ComfyUI already binds 127.0.0.1:8188 (e.g. portable install),
    # browsers hitting http://127.0.0.1:8188 reach THAT app, not Docker — set COMFYUI_HOST_PORT=8189 in .env.
    ports:
      - "${COMFYUI_HOST_PORT:-8188}:8188"    # ComfyUI
      - "8888:8888"    # Jupyter (if you want)
      - "6006:6006"    # TensorBoard (optional)
      - "8790:8790"    # Experiments UI (optional)
      # Vite inside the container listens on 5178; publish on a *different* host port so host-side
      # `npm run ui:dev:start` (Vite on :5178) does not clash with com.docker.backend on 0.0.0.0:5178.
      - "${EXPERIMENTS_UI_VITE_HOST_PORT:-51780}:5178"
    
    # Environment
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_ALLOC_CONF=max_split_size_mb:512
      - ENVIRONMENT=local
      # Set container timezone (affects ComfyUI log timestamps)
      - TZ=America/New_York
      # Log more info to `docker logs` (use DEBUG temporarily if needed)
      - COMFYUI_LOG_STDOUT=true
      - COMFYUI_VERBOSE=INFO
      # Enable automatic WAN model downloads
      - download_480p_native_models=true
      - download_720p_native_models=true
      - download_wan_fun_and_sdxl_helper=true
      - download_wan22=true
      - download_vace=true
      - download_wan_animate=true
      # Optional: Enable debug models
      - debug_models=false
      - download_vace_debug=false
      # Credentials (will be loaded from .env file)
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - CIVITAI_TOKEN=${CIVITAI_TOKEN:-}
      - civitai_token=${CIVITAI_TOKEN:-}

      # Experiments UI (served on separate port by entrypoint.sh)
      - EXPERIMENTS_UI=${EXPERIMENTS_UI:-false}
      - EXPERIMENTS_UI_PORT=${EXPERIMENTS_UI_PORT:-8790}
      - EXPERIMENTS_UI_BUILD=${EXPERIMENTS_UI_BUILD:-true}
      # Create-from-WIP browse root (relative to workspace unless absolute). Default: output/output/wip
      - EXPERIMENTS_UI_WIP_ROOT=${EXPERIMENTS_UI_WIP_ROOT:-}
      # Load ComfyUI-MultiGPU from custom_nodes (default on). Set false on single-GPU / if you symlink it away.
      - INSTALL_MULTIGPU=${INSTALL_MULTIGPU:-true}
      # Krita AI Diffusion (desktop plugin) backend — off by default so ComfyUI is not pulling Krita model sets / Acly nodes unless you opt in.
      # See docs/KRITA_AI_SETUP.md. Set both to true in .env when using Krita as a client to this ComfyUI.
      - AUTO_DOWNLOAD_KRITA_AI_MODELS=${AUTO_DOWNLOAD_KRITA_AI_MODELS:-false}
      - INSTALL_KRITA_BACKEND_NODES=${INSTALL_KRITA_BACKEND_NODES:-false}
      - KRITA_DOWNLOAD_PRESET=${KRITA_DOWNLOAD_PRESET:---recommended}
    
    # Shared memory for data loaders
    shm_size: '8gb'
    
    # Restart policy
    restart: unless-stopped
    
    # Keep container running
    stdin_open: true
    tty: true

  watch_queue:
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-watch-queue
    depends_on:
      - comfyui
    restart: unless-stopped
    # The image entrypoint starts ComfyUI + optional services; for watch_queue we want
    # to run the queue watcher only, so bypass the image entrypoint.
    entrypoint: ["python3", "/workspace/ws_scripts/watch_queue.py"]
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI, so localhost:8188 will fail.
    # Probe the comfyui service over the compose network instead.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - /workspace/output/output/experiments
      - --server
      - http://comfyui:8188
      - --poll
      - "2.0"
      - --max-inflight
      - "16"

  # Optional: Docker-native periodic jobs (avoid Windows Scheduled Tasks).
  # Enable with:
  #   docker compose --profile ops up -d
  refresh_run_status:
    profiles: ["ops"]
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-refresh-run-status
    depends_on:
      - comfyui
    restart: unless-stopped
    entrypoint: ["sh", "-lc"]
    environment:
      - SERVER_URL=http://comfyui:8188
      - REFRESH_INTERVAL_S=60
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - >-
        while true; do
          python3 /workspace/ws_scripts/refresh_run_status.py --server "$$SERVER_URL" || true;
          sleep "$${REFRESH_INTERVAL_S}";
        done

  report_experiment_queue_status:
    profiles: ["ops"]
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-report-queue-status
    depends_on:
      - comfyui
    restart: unless-stopped
    entrypoint: ["sh", "-lc"]
    environment:
      - SERVER_URL=http://comfyui:8188
      - REPORT_INTERVAL_S=60
      - REPORT_LIMIT=10
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - >-
        mkdir -p /workspace/output/output/experiments/_status;
        LOG=/workspace/output/output/experiments/_status/queue_status.log;
        while true; do
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)]";
          python3 /workspace/ws_scripts/report_experiment_queue_status.py --server "$$SERVER_URL" --newest-first --limit "$$REPORT_LIMIT" --summary-only;
          echo;
          sleep "$${REPORT_INTERVAL_S}";
        done >> "$$LOG" 2>&1

  queue_incomplete_experiments:
    profiles: ["ops"]
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-queue-incomplete
    depends_on:
      - comfyui
    restart: unless-stopped
    entrypoint: ["sh", "-lc"]
    environment:
      - SERVER_URL=http://comfyui:8188
      - QUEUE_INTERVAL_S=600
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - >-
        while true; do
          python3 /workspace/ws_scripts/queue_incomplete_experiments.py --server "$$SERVER_URL" || true;
          sleep "$${QUEUE_INTERVAL_S}";
        done

  queue_ledger:
    profiles: ["ops"]
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-queue-ledger
    depends_on:
      - comfyui
    restart: unless-stopped
    entrypoint: ["sh", "-lc"]
    environment:
      - SERVER_URL=http://comfyui:8188
      - LEDGER_PENDING_TARGET=2
      - LEDGER_SPILLOVER_ENABLED=false
      - LEDGER_POLL_NORMAL_S=0.5
      - LEDGER_POLL_CHURN_S=3
      - LEDGER_CHURN_WINDOW_S=30
      - LEDGER_QUIET_WINDOW_S=45
      - LEDGER_CHURN_THRESHOLD=2
      - LEDGER_EXPECTED_ADD_TTL_S=20
      - LEDGER_MAX_RESTORE_ATTEMPTS=2
      - LEDGER_RESTORE_COOLDOWN_S=120
      - LEDGER_BREAKER_FAILURE_THRESHOLD=3
      - LEDGER_BREAKER_WINDOW_S=120
      - LEDGER_BREAKER_OPEN_S=180
      - LEDGER_CLIENT_ID=comfy-queue-ledger
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - >-
        python3 /workspace/ws_scripts/comfy_queue_ledger.py
        --server "$$SERVER_URL"
        --pending-target "$$LEDGER_PENDING_TARGET"
        $$( [ "$$LEDGER_SPILLOVER_ENABLED" = "true" ] && echo "--spillover-enabled" || true )
        --poll-interval-normal "$$LEDGER_POLL_NORMAL_S"
        --poll-interval-churn "$$LEDGER_POLL_CHURN_S"
        --churn-window-s "$$LEDGER_CHURN_WINDOW_S"
        --quiet-window-s "$$LEDGER_QUIET_WINDOW_S"
        --churn-threshold "$$LEDGER_CHURN_THRESHOLD"
        --expected-add-ttl-s "$$LEDGER_EXPECTED_ADD_TTL_S"
        --max-restore-attempts "$$LEDGER_MAX_RESTORE_ATTEMPTS"
        --restore-cooldown-s "$$LEDGER_RESTORE_COOLDOWN_S"
        --breaker-failure-threshold "$$LEDGER_BREAKER_FAILURE_THRESHOLD"
        --breaker-window-s "$$LEDGER_BREAKER_WINDOW_S"
        --breaker-open-s "$$LEDGER_BREAKER_OPEN_S"
        --client-id "$$LEDGER_CLIENT_ID"

  ws_event_tap:
    profiles: ["ops"]
    image: schibbdev/comfyui-runpod:v1.2.0
    container_name: comfyui0-ws-event-tap
    depends_on:
      - comfyui
    restart: unless-stopped
    # Primary runtime timing source: listen to ComfyUI /ws and write per-run metrics.json fields.
    entrypoint: ["sh", "-lc"]
    environment:
      - SERVER_URL=http://comfyui:8188
      - SCAN_EVERY_S=10
      - WS_CLIENT_IDS=comfy_tool
      - WS_AUTO_LEGACY_FROM_QUEUE=true
      - WS_MAX_CLIENT_IDS=8
      - WS_DEBUG=false
    volumes:
      - ./workspace:/workspace
      - ${COMFYUI_BIND_INPUT_DIR:-./workspace/input}:/workspace/input
      - ${COMFYUI_BIND_OUTPUT_DIR:-./workspace/output}:/workspace/output
      - ${COMFYUI_BIND_USER_DIR:-./workspace/comfyui_user}:/workspace/comfyui_user
      - ./workspace/scripts:/workspace/ws_scripts:ro
    # Override image healthcheck: this container does not run ComfyUI.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://comfyui:8188/queue\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command:
      - >-
        python3 /workspace/ws_scripts/ws_event_tap.py
        --server "$$SERVER_URL"
        --client-id "$$WS_CLIENT_IDS"
        $$( [ "$$WS_AUTO_LEGACY_FROM_QUEUE" = "true" ] && echo "--auto-legacy-from-queue" || true )
        --max-client-ids "$$WS_MAX_CLIENT_IDS"
        --scan-every "$$SCAN_EVERY_S"
        $$( [ "$$WS_DEBUG" = "true" ] && echo "--debug" || true )

volumes:
  workspace:
  experiments_ui_node_modules:
